<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <h1>inserindo videos hospedados localmente</h1>
    <p>este video esta hospedado no seu propio servidor.</p>

    <video width="600px" controls loop>
        <source src="midias/edit.mp4" type="video/mp4">
        <source src="midias/edit.m4v" type="video/m4v">
        <source src="midias/edit.webm" type="video/webm">
        <source src="midias/edit.ogg" type="video/ogg">
        <p>seu navegador não esta compativel com a reprodução de video <a href="midias/edit.mp4">clique aqui para baixar</a></p>
    </video>

    <h1>inserindo videos do youtube</h1>
    <iframe width="600" height="315" src="https://www.youtube.com/embed/9_VAGhAdne8?si=3Cu-__XexcdRoiVf" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
